<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAPT2MQTT</title>
  <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 18V8h1V7H5v1H4v10h1v1h8v-1H6z" opacity="0.3"/>
      <path d="M5 6h8v1H5V6zM4 7h1v1H4V7zM3 8h1v10H3V8zM4 18h1v1H4v-1zM5 19h8v1H5v-1zM13 18h1v1h-1v-1zM14 8h1v10h-1V8zM13 7h1v1h-1V7z"/>
      <path d="M15 10h2v2h-2v-2zM15 8h2v2h1V8h-1V7h-2v1z"/>
      <path d="M17 12h-2v1h2v-1zM6 8h7v1H6V8z" opacity="0.5"/>
      <circle cx="9" cy="2" r="1"/>
      <path d="M5.5 4.5a5 5 0 0 1 7 0" stroke="currentColor" stroke-width="1.2" fill="none"/>
      <path d="M3.5 3a8 8 0 0 1 11 0" stroke="currentColor" stroke-width="1.2" fill="none"/>
    </svg>
    <h1>RAPT2MQTT</h1>
    <span id="status-dot" class="status-dot stopped"></span>
    <span id="status-text" style="font-size:0.85em;color:#8b949e">Stopped</span>
  </header>

  <div class="panel">
    <h2>Configuration</h2>
    <div class="form-grid">
      <div class="form-group">
        <label for="mqtt_host">MQTT Host</label>
        <input type="text" id="mqtt_host" placeholder="192.168.1.100">
      </div>
      <div class="form-group">
        <label for="mqtt_port">MQTT Port</label>
        <input type="number" id="mqtt_port" value="1883">
      </div>
      <div class="form-group">
        <label for="mqtt_username">MQTT Username</label>
        <input type="text" id="mqtt_username" placeholder="(optional)">
      </div>
      <div class="form-group">
        <label for="mqtt_password">MQTT Password</label>
        <input type="password" id="mqtt_password" placeholder="(optional)">
      </div>
      <div class="form-group">
        <label for="rapt_email">RAPT Email</label>
        <input type="email" id="rapt_email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="rapt_secret">RAPT API Secret</label>
        <input type="password" id="rapt_secret" placeholder="Your API secret">
      </div>
      <div class="form-group">
        <label for="poll_interval">Poll Interval (seconds)</label>
        <input type="number" id="poll_interval" value="60" min="10" max="3600">
      </div>
      <div class="form-group checkbox-group">
        <input type="checkbox" id="auto_start" checked>
        <label for="auto_start">Auto-start on container launch</label>
      </div>
    </div>
    <div class="btn-row">
      <button id="btn-save" class="btn-save">Save Configuration</button>
    </div>
  </div>

  <div class="panel">
    <div class="controls">
      <h2 style="margin-bottom:0">Bridge</h2>
      <button id="btn-start" class="btn-start">Start</button>
      <button id="btn-stop" class="btn-stop" disabled>Stop</button>
    </div>
  </div>

  <div class="panel">
    <h2>Console</h2>
    <div id="console"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/static/app.js"></script>
</body>
</html>
