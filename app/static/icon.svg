<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Beer mug body -->
  <rect x="3" y="11" width="12" height="12" rx="1.5" fill="#e6a817"/>
  <!-- Beer foam bubbles -->
  <ellipse cx="5" cy="11.2" rx="2.2" ry="1.6" fill="#fff"/>
  <ellipse cx="9" cy="10.5" rx="2.8" ry="2" fill="#fff"/>
  <ellipse cx="13" cy="11.2" rx="2.2" ry="1.6" fill="#fff"/>
  <ellipse cx="7" cy="10.8" rx="1.5" ry="1.2" fill="#f5f5f5"/>
  <ellipse cx="11" cy="10.8" rx="1.5" ry="1.2" fill="#f5f5f5"/>
  <!-- Mug handle -->
  <path d="M15 14h2a2 2 0 0 1 2 2v1.5a2 2 0 0 1-2 2h-2" fill="none" stroke="#e6a817" stroke-width="2" stroke-linecap="round"/>
  <!-- Beer lines -->
  <line x1="5.5" y1="14" x2="5.5" y2="20" stroke="#d4960f" stroke-width="0.6" opacity="0.4"/>
  <line x1="9" y1="13" x2="9" y2="21" stroke="#d4960f" stroke-width="0.6" opacity="0.4"/>
  <line x1="12.5" y1="14" x2="12.5" y2="20" stroke="#d4960f" stroke-width="0.6" opacity="0.4"/>
  <!-- Wifi arcs - centered above mug, inside frame -->
  <circle cx="9" cy="5" r="1" fill="#58a6ff"/>
  <path d="M6.2 6.8a4 4 0 0 1 5.6 0" fill="none" stroke="#58a6ff" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M4 5a7 7 0 0 1 10 0" fill="none" stroke="#58a6ff" stroke-width="1.2" stroke-linecap="round"/>
</svg>
