<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 22" width="24" height="22">
  <!-- Beer mug body -->
  <rect x="3" y="9" width="12" height="12" rx="1.5" fill="#e6a817"/>
  <!-- Beer foam bubbles with grey outline -->
  <ellipse cx="5" cy="9.2" rx="2.2" ry="1.6" fill="#fff" stroke="#8b949e" stroke-width="0.4"/>
  <ellipse cx="9" cy="8.5" rx="2.8" ry="2" fill="#fff" stroke="#8b949e" stroke-width="0.4"/>
  <ellipse cx="13" cy="9.2" rx="2.2" ry="1.6" fill="#fff" stroke="#8b949e" stroke-width="0.4"/>
  <ellipse cx="7" cy="8.8" rx="1.5" ry="1.2" fill="#f5f5f5" stroke="#a0a0a0" stroke-width="0.3"/>
  <ellipse cx="11" cy="8.8" rx="1.5" ry="1.2" fill="#f5f5f5" stroke="#a0a0a0" stroke-width="0.3"/>
  <!-- Mug handle (grey for glass) -->
  <path d="M15 12h2a2 2 0 0 1 2 2v1.5a2 2 0 0 1-2 2h-2" fill="none" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>
  <!-- Beer lines -->
  <line x1="5.5" y1="12" x2="5.5" y2="18" stroke="#d4960f" stroke-width="0.6" opacity="0.4"/>
  <line x1="9" y1="11" x2="9" y2="19" stroke="#d4960f" stroke-width="0.6" opacity="0.4"/>
  <line x1="12.5" y1="12" x2="12.5" y2="18" stroke="#d4960f" stroke-width="0.6" opacity="0.4"/>
  <!-- Wifi arcs -->
  <circle cx="9" cy="3" r="1" fill="#58a6ff"/>
  <path d="M6.2 4.8a4 4 0 0 1 5.6 0" fill="none" stroke="#58a6ff" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M4 3a7 7 0 0 1 10 0" fill="none" stroke="#58a6ff" stroke-width="1.2" stroke-linecap="round"/>
</svg>
